basePath: /api/v1
definitions:
  dto.ForgotPasswordRequest:
    properties:
      identifier:
        description: email atau username
        type: string
    required:
    - identifier
    type: object
  dto.LoginRequest:
    properties:
      identifier:
        description: username atau email
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      password:
        type: string
      username:
        maxLength: 150
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  dto.RegisterResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      is_verified:
        type: boolean
      name:
        type: string
      username:
        type: string
    type: object
  dto.ResetPasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - new_password
    - token
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: detik
        type: integer
      refresh_token:
        type: string
      token_type:
        description: Bearer
        type: string
      user:
        $ref: '#/definitions/dto.UserInfo'
    type: object
  dto.UserInfo:
    properties:
      email:
        type: string
      id:
        type: integer
      is_staff:
        type: boolean
      is_superuser:
        type: boolean
      is_verified:
        type: boolean
      name:
        type: string
      username:
        type: string
    type: object
  response.MyGoResponse:
    description: Standard JSON response
    properties:
      data: {}
      errors: {}
      message:
        type: string
      status:
        type: boolean
    type: object
host: localhost:1323
info:
  contact:
    email: support@neosim.id
    name: Neosim Support
  description: REST API untuk Neosim — sistem manajemen informasi
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Neosim API V1
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Mengirim email reset password. Selalu response 200 untuk keamanan.
      parameters:
      - description: Forgot Password Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MyGoResponse'
      summary: Lupa password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login menggunakan username atau email dan password
      parameters:
      - description: Login Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.MyGoResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.MyGoResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.MyGoResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.MyGoResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/response.MyGoResponse'
      summary: Login user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Memperbarui access token menggunakan refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.MyGoResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.MyGoResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Mendaftarkan akun baru
      parameters:
      - description: Register Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.MyGoResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.RegisterResponse'
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.MyGoResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.MyGoResponse'
      summary: Register user baru
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Mereset password menggunakan token dari email
      parameters:
      - description: Reset Password Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MyGoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.MyGoResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.MyGoResponse'
      summary: Reset password
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    description: 'Masukkan token dengan format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
